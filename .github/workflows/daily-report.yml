name: "🔥 Daily Hot Report"

on:
  schedule:
    # 每天 UTC 0:00 = 北京时间 8:00
    - cron: "0 0 * * *"
  workflow_dispatch: # 支持手动触发（测试用）

permissions:
  contents: write  # 允许 push 报告到仓库

jobs:
  hot-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 📦 Install dependencies
        run: pip install -e .

      - name: 🔥 Run GitHub Hot Hub
        env:
          GHH_GITHUB_TOKEN: ${{ secrets.GHH_GITHUB_TOKEN }}
          GHH_WECOM_WEBHOOK_URL: ${{ secrets.GHH_WECOM_WEBHOOK_URL }}
          GHH_LLM_API_KEY: ${{ secrets.GHH_LLM_API_KEY }}
          GHH_LLM_BASE_URL: ${{ secrets.GHH_LLM_BASE_URL }}
          GHH_LLM_MODEL: ${{ secrets.GHH_LLM_MODEL }}
        run: python -m src.main --notify

      - name: 📤 Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hot-report-${{ github.run_id }}
          path: reports/*.md
          retention-days: 30

      - name: 📝 Commit report to repo
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f reports/*.md
          # 只在有新文件时才 commit
          git diff --cached --quiet || git commit -m "docs: 📊 $(date -u +%Y-%m-%d) 每日热点报告"
          git push
